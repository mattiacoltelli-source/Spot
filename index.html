<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
  <title>Explorer</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f14">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- MAP -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- STYLE -->
  <link rel="stylesheet" href="styles.css?v=3">

  <!-- DATA -->
  <script src="spots.js?v=3"></script>
</head>

<body>
  <div class="app-bg"></div>

  <!-- SPLASH -->
  <div class="splash" id="splash">
    <div class="splash-card">
      <div class="splash-emoji">🗺️</div>
      <div class="splash-title">Explorer</div>
      <div class="splash-sub">Guida smart per spot, meteo e decisioni veloci.</div>
      <div class="splash-bar"><div></div></div>
    </div>
  </div>

  <div class="wrap">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-top">
        <div class="eyebrow">
          <span class="eyebrow-dot"></span>
          <span id="eyebrowRegion">Zona attiva</span>
        </div>

        <label class="mode-switch" for="sailModeToggle">
          <input type="checkbox" id="sailModeToggle">
          <span class="mode-switch-track">
            <span class="mode-switch-thumb"></span>
          </span>
          <span class="mode-switch-label">
            <strong id="modeLabelMain">Travel Mode</strong>
            <small id="modeLabelSub">Sail mode OFF</small>
          </span>
        </label>
      </div>

      <h1 id="heroTitle">Vai negli spot giusti,<br>al momento giusto.</h1>

      <p id="heroDescription">
        Decisioni intelligenti basate su meteo, distanza e contesto. Meno scroll, più esperienza.
      </p>

      <div class="hero-actions">
        <div class="search-box glass">
          <input id="searchInput" type="text"
            placeholder="Cerca spot (es: tramonto facile, trekking wow, acqua calma)">
          <button class="btn btn-primary tap" id="searchBtn" type="button">Cerca</button>
          <button class="btn btn-secondary tap" id="goNowBtn" type="button">Vai ora</button>
        </div>

        <div class="panel glass side-actions">
          <button class="btn btn-gold tap" id="autofillPlannerBtn" type="button">Pianifica</button>
          <button class="btn btn-secondary tap" id="gpsBtn" type="button">GPS</button>
        </div>
      </div>
    </section>

    <!-- HOME -->
    <section id="page-home" class="page active">
      <div class="stack">

        <div class="quick-grid" id="quickGrid"></div>

        <div class="panel glass">
          <div class="panel-head">
            <h2>Meteo e condizioni</h2>
            <span class="tiny muted" id="conditionsSub">Live</span>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
          <div id="weatherAlert" class="alert ok" style="margin-top:10px">Caricamento meteo...</div>
        </div>

        <div class="panel glass">
          <div class="panel-head">
            <h2>Prossime 12 ore</h2>
          </div>
          <div class="hourly-strip" id="hourlyStrip"></div>
        </div>

        <div class="panel glass">
          <h2>Planner giornata</h2>
          <div class="planner-box" id="plannerBox"></div>
          <div class="planner-actions">
            <button class="btn btn-secondary tap" id="plannerOpenBtn">Apri</button>
            <button class="btn btn-danger tap" id="clearPlannerBtn">Reset</button>
          </div>
        </div>

      </div>
    </section>

    <!-- MAP -->
    <section id="page-map" class="page">
      <div class="map-panel glass">
        <div id="map"></div>
      </div>
    </section>

    <!-- SPOTS -->
    <section id="page-spots" class="page">
      <div class="panel glass">
        <div class="spot-list" id="spotList"></div>
      </div>
    </section>

    <!-- DETAIL -->
    <section id="page-detail" class="page">
      <div class="panel glass">
        <div id="spotDetail"></div>
      </div>
    </section>

  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home">Home</button>
    <button class="nav-btn" data-page="map">Mappa</button>
    <button class="nav-btn" data-page="spots">Spot</button>
    <button class="nav-btn" data-page="detail">Dettaglio</button>
  </nav>

  <div class="toast-wrap" id="toastWrap"></div>

  <!-- SCRIPTS (cache busting 🔥) -->
  <script src="sail.js?v=3"></script>
  <script src="ui.js?v=3"></script>
  <script src="app.js?v=3"></script>

</body>
</html>
