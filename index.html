<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Madeira Photo Planner</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:white;
  font-family:system-ui;
}
.container{padding:16px;}
h1{font-size:24px;}

button{
  padding:10px;
  margin:4px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.main-btn{background:#f5c451;width:100%;}
.filter-btn{background:#171f2e;color:white}

.spot{
  background:#121824;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.meta{color:#9aa7b5;font-size:13px}
</style>
</head>

<body>
<div class="container">

<h1>📸 Madeira Planner</h1>

<button class="main-btn" onclick="spotOra()">🔥 Spot ora</button>

<h3>Filtro luce</h3>
<button class="filter-btn" onclick="setFiltro('all')">Tutti</button>
<button class="filter-btn" onclick="setFiltro('alba')">Alba</button>
<button class="filter-btn" onclick="setFiltro('tramonto')">Tramonto</button>

<h3>Zona</h3>
<button class="filter-btn" onclick="setZona('all')">Tutte</button>
<button class="filter-btn" onclick="setZona('nord')">Nord</button>
<button class="filter-btn" onclick="setZona('sud')">Sud</button>
<button class="filter-btn" onclick="setZona('est')">Est</button>
<button class="filter-btn" onclick="setZona('ovest')">Ovest</button>

<div id="list"></div>

</div>

<script>

let filtro="all"
let zona="all"
let userPos=null

navigator.geolocation.getCurrentPosition(p=>{
  userPos={lat:p.coords.latitude,lon:p.coords.longitude}
  render()
})

// SPOT
const spots=[
{name:"Pico Arieiro",lat:32.73,lon:-16.93,type:"alba",zone:"montagna"},
{name:"Pico Ruivo",lat:32.76,lon:-16.94,type:"alba",zone:"montagna"},
{name:"Ponta São Lourenço",lat:32.74,lon:-16.70,type:"alba",zone:"est"},
{name:"Seixal Beach",lat:32.82,lon:-17.10,type:"alba",zone:"nord"},
{name:"Fanal Forest",lat:32.76,lon:-17.13,type:"giorno",zone:"ovest"},
{name:"Porto Moniz",lat:32.87,lon:-17.16,type:"tramonto",zone:"ovest"},
{name:"Câmara de Lobos",lat:32.64,lon:-16.97,type:"tramonto",zone:"sud"},
{name:"Cabo Girão",lat:32.65,lon:-17.00,type:"tramonto",zone:"sud"},
{name:"Santana Houses",lat:32.80,lon:-16.88,type:"giorno",zone:"nord"},
{name:"Funchal Old Town",lat:32.64,lon:-16.90,type:"street",zone:"sud"}
]

// distanza
function dist(a,b,c,d){
  const R=6371
  const dLat=(c-a)*Math.PI/180
  const dLon=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))
}

// filtri
function setFiltro(f){filtro=f;render()}
function setZona(z){zona=z;render()}

// spot ora
function spotOra(){
  const hour=new Date().getHours()
  let type="giorno"
  if(hour<8) type="alba"
  else if(hour>18) type="tramonto"

  let s=spots.filter(x=>x.type===type)

  if(userPos){
    s.sort((a,b)=>dist(userPos.lat,userPos.lon,a.lat,a.lon)-dist(userPos.lat,userPos.lon,b.lat,b.lon))
  }

  alert("Vai qui: "+s[0].name)
}

// render
function render(){
  let html=""

  let filtered=spots.filter(s=>{
    return (filtro==="all"||s.type===filtro) &&
           (zona==="all"||s.zone===zona)
  })

  filtered.forEach(s=>{
    let d=userPos?dist(userPos.lat,userPos.lon,s.lat,s.lon).toFixed(1)+" km":""
    html+=`
    <div class="spot">
      <b>${s.name}</b><br>
      <div class="meta">${s.type} • ${s.zone} • ${d}</div>
      <button onclick="maps(${s.lat},${s.lon})">Apri</button>
    </div>`
  })

  document.getElementById("list").innerHTML=html
}

function maps(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`)
}

render()

</script>

<!-- ✅ SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
