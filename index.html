<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Madeira Planner PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:system-ui;}
.container{padding:16px;max-width:600px;margin:auto;}

h1{font-size:24px}

button{
  padding:10px;
  margin:4px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.main{background:#f5c451;width:100%;}
.filter{background:#171f2e;color:white}

.spot{
  background:#121824;
  padding:14px;
  border-radius:14px;
  margin-top:10px;
}

.meta{color:#9aa7b5;font-size:13px}

/* modal */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000000cc;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.box{
  background:#121824;
  padding:16px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* map */
#mapModal{
  display:none;
  position:fixed;
  inset:0;
  background:#0b0f14;
  flex-direction:column;
}
#map{flex:1}
</style>
</head>

<body>
<div class="container">

<h1>📸 Madeira PRO</h1>

<button class="main" onclick="spotOra()">🔥 Spot ora</button>
<button class="main" onclick="giornata()">📅 Crea giornata</button>
<button class="main" onclick="openMap()">🗺️ Mappa</button>

<h3>Filtro attività</h3>
<button class="filter" onclick="setFiltroAct('all')">Tutti</button>
<button class="filter" onclick="setFiltroAct('trekking')">Trekking</button>
<button class="filter" onclick="setFiltroAct('mtb')">MTB</button>
<button class="filter" onclick="setFiltroAct('view')">View</button>

<div id="list"></div>
</div>

<!-- modal -->
<div id="modal">
  <div class="box">
    <h2 id="title"></h2>
    <img id="img" style="width:100%;border-radius:10px">
    <p id="desc"></p>
    <p id="info"></p>
    <button onclick="google()">📸 Foto</button>
    <button onclick="maps()">🗺️ Vai</button>
    <button onclick="closeModal()">Chiudi</button>
  </div>
</div>

<!-- map -->
<div id="mapModal">
  <button onclick="closeMap()">Chiudi</button>
  <div id="map"></div>
</div>

<script>

let userPos=null
let current=null
let filtroAct="all"

navigator.geolocation.getCurrentPosition(p=>{
  userPos={lat:p.coords.latitude,lon:p.coords.longitude}
  render()
})

function dist(a,b,c,d){
  const R=6371
  const dLat=(c-a)*Math.PI/180
  const dLon=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))
}

/* base */
const base=[
{name:"Pico Arieiro",type:"alba",zone:"montagna",activity:"trekking",difficulty:"medio"},
{name:"Pico Ruivo",type:"alba",zone:"montagna",activity:"trekking",difficulty:"impegnativo"},
{name:"Fanal",type:"giorno",zone:"ovest",activity:"trekking",difficulty:"facile"},
{name:"Porto Moniz",type:"tramonto",zone:"ovest",activity:"view",difficulty:"facile"},
{name:"Cabo Girão",type:"tramonto",zone:"sud",activity:"view",difficulty:"facile"},
{name:"Santana",type:"giorno",zone:"nord",activity:"relax",difficulty:"facile"},
{name:"Seixal",type:"alba",zone:"nord",activity:"view",difficulty:"facile"},
{name:"Ponta São Lourenço",type:"alba",zone:"est",activity:"trekking",difficulty:"medio"}
]

let spots=[]
for(let i=0;i<10;i++){
  base.forEach(s=>{
    spots.push({
      ...s,
      name:s.name+" "+(i+1),
      lat:32.7+(Math.random()/10),
      lon:-16.9+(Math.random()/10),
      desc:"Attività "+s.activity+" perfetta a Madeira"
    })
  })
}

/* render */
function render(){
  let html=""
  let list=spots.filter(s=>filtroAct==="all"||s.activity===filtroAct)

  list.forEach(s=>{
    let d=userPos?dist(userPos.lat,userPos.lon,s.lat,s.lon).toFixed(1)+" km":""
    html+=`
    <div class="spot" onclick='openModal(${JSON.stringify(s)})'>
      <b>${s.name}</b>
      <div class="meta">${s.activity} • ${s.difficulty} • ${d}</div>
    </div>`
  })

  document.getElementById("list").innerHTML=html
}

/* modal */
function openModal(s){
  current=s
  title.innerText=s.name
  desc.innerText=s.desc
  info.innerText=s.activity+" • "+s.difficulty
  img.src="https://picsum.photos/seed/"+s.name+"/600/400"
  modal.style.display="flex"
}

function closeModal(){modal.style.display="none"}

function maps(){
  window.open(`https://www.google.com/maps?q=${current.lat},${current.lon}`)
}

function google(){
  window.open(`https://www.google.com/search?q=${current.name}&tbm=isch`)
}

/* giornata */
function giornata(){
  let alba=spots.find(s=>s.type==="alba")
  let att=spots.find(s=>s.activity==="trekking")
  let tram=spots.find(s=>s.type==="tramonto")

  alert(`
🌅 ${alba.name}
🥾 ${att.name}
🌇 ${tram.name}
`)
}

/* filtri */
function setFiltroAct(f){
  filtroAct=f
  render()
}

/* spot ora */
function spotOra(){
  alert("Usa giornata per miglior risultato 😉")
}

/* map */
let mapInit=false
function openMap(){
  mapModal.style.display="flex"

  if(!mapInit){
    const map=L.map('map').setView([32.75,-16.95],10)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

    spots.forEach(s=>{
      L.marker([s.lat,s.lon]).addTo(map).bindPopup(s.name)
    })

    mapInit=true
  }
}

function closeMap(){
  mapModal.style.display="none"
}

render()

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

</script>
</body>
</html>
